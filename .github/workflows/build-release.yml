name: Build & Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Subir versionCode y versionName
        id: bump
        run: |
          CURRENT_CODE=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' app/build.gradle.kts)
          NEW_CODE=$((CURRENT_CODE + 1))
          sed -i "s/versionCode = $CURRENT_CODE/versionCode = $NEW_CODE/" app/build.gradle.kts

          CURRENT_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          NEW_NAME="${CURRENT_NAME%.*}.$NEW_CODE"
          sed -i "s/versionName = \"$CURRENT_NAME\"/versionName = \"$NEW_NAME\"/" app/build.gradle.kts

          echo "code=$NEW_CODE" >> "$GITHUB_OUTPUT"
          echo "name=$NEW_NAME" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Decodificar keystore
        run: |
          RAW_LEN=$(printf '%s' "${{ secrets.KEYSTORE_BASE64 }}" | wc -c)
          echo "Longitud del secret KEYSTORE_BASE64 recibido: $RAW_LEN caracteres"
          if [ "$RAW_LEN" -eq 0 ]; then
            echo "::error::El secret KEYSTORE_BASE64 llega vacío al runner. Revisa en GitHub Settings > Secrets and variables > Actions que el secret KEYSTORE_BASE64 (a nivel de repo, no de Environment) tenga contenido."
            exit 1
          fi
          echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '[:space:]' | base64 -d > app/release.keystore

      - name: Verificar formato del keystore decodificado
        run: |
          SIZE=$(wc -c < app/release.keystore)
          MAGIC=$(od -An -tx1 -N 4 app/release.keystore | tr -d ' ')
          echo "Tamaño: $SIZE bytes — magic bytes: $MAGIC"
          if [ "$MAGIC" != "feedfeed" ]; then
            echo "::error::El keystore decodificado NO es JKS (magic=$MAGIC, se esperaba feedfeed). Regenera el base64 con [Convert]::ToBase64String([IO.File]::ReadAllBytes('ruta\\web2app-release.keystore')) y actualiza el secret KEYSTORE_BASE64."
            exit 1
          fi

      - name: Dar permisos de ejecución a gradlew
        run: chmod +x gradlew

      - name: Compilar APK release firmado
        run: |
          for i in 1 2 3; do
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file=$(pwd)/app/release.keystore \
              -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
              -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
              -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}" \
              -PPIXABAY_API_KEY="${{ secrets.PIXABAY_API_KEY }}" \
              && break
            echo "Intento $i fallido, reintentando en 30s..."
            sleep 30
            if [ "$i" == "3" ]; then exit 1; fi
          done

      - name: Generar version.json
        run: |
          cat > version.json <<EOF
          {
            "versionCode": ${{ steps.bump.outputs.code }},
            "versionName": "${{ steps.bump.outputs.name }}",
            "apkUrl": "https://github.com/${{ github.repository }}/releases/download/v${{ steps.bump.outputs.name }}/app-release.apk"
          }
          EOF

      - name: Commit cambios (versiones)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add app/build.gradle.kts version.json
          git commit -m "chore: release v${{ steps.bump.outputs.name }}"
          git pull --rebase --autostash origin main
          git push

      - name: Crear Release con APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.name }}
          name: v${{ steps.bump.outputs.name }}
          files: app/build/outputs/apk/release/app-release.apk
          body: "Release manual."
